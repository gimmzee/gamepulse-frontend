name: Frontend Deploy to Dev

on:
  workflow_run:
    workflows: [ "Frontend CI Pipeline" ]
    branches: [ develop ]
    types: [ completed ]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Get short SHA
        id: short_sha
        run: |
          echo "sha=$(echo ${{ github.event.workflow_run.head_sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Update dev image tag
        run: |
          IMAGE_TAG="sha-${{ steps.short_sha.outputs.sha }}"
          git clone https://x-access-token:${{ secrets.INFRA_TOKEN }}@github.com/${{ github.repository_owner }}/gamepulse-infra.git
          cd gamepulse-infra
          sed -i "/gamepulse-frontend$/{n;s|newTag:.*|newTag: ${IMAGE_TAG}|}" k8s/overlays/dev/kustomization.yaml
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add .
          git diff --staged --quiet || git commit -m "chore: update frontend dev image tag to ${IMAGE_TAG}"
          git push